<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMS Scraper Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <h1>AMS Scraper Studio</h1>
        <p>Micro-SaaS für AMS-Stellenexporte als CSV und Excel.</p>
      </header>

      <section class="card">
        <h2>Suche</h2>
        <div class="grid search-grid">
          <label class="col-query">Suche nach<input id="query" placeholder="Beruf, Kompetenz, Unternehmen ..." /></label>
          <label class="col-location">Ort
            <div class="autocomplete-wrap">
              <input id="location" placeholder="Ort, PLZ, Bundesland" autocomplete="off" />
              <ul class="ac-list" id="locationList" hidden></ul>
            </div>
          </label>
          <label class="col-radius">Umkreis (km)
            <select id="radius" disabled>
              <option value="5">5 km</option>
              <option value="10">10 km</option>
              <option value="20" selected>20 km</option>
              <option value="25">25 km</option>
              <option value="50">50 km</option>
              <option value="100">100 km</option>
            </select>
          </label>
          <label class="col-pages">Max. Seiten<input id="maxPages" type="number" min="1" max="100" value="10" /></label>
          <label class="col-jobs">Max. Jobs<input id="maxJobs" type="number" min="1" max="3000" value="120" /></label>
        </div>
      </section>

      <section class="card">
        <h2>Quelle der Stellenangebote</h2>
        <p class="muted">Zusätzlich zu AMS-Stellenangeboten:</p>
        <div class="option-list">
          <label class="check"><input type="checkbox" data-filter-key="jobOfferTypes" value="SB_WKO" checked /> Stellenangebote von Unternehmen aus dem AMS eJob-Room</label>
          <label class="check"><input type="checkbox" data-filter-key="jobOfferTypes" value="IJ" checked /> Stellenangebote aus dem Internet</label>
          <label class="check"><input type="checkbox" data-filter-key="jobOfferTypes" value="BA" checked /> Stellenangebote von der Bundesagentur für Arbeit (DE)</label>
        </div>
      </section>

      <section class="card filter-panels">
        <article class="panel">
          <h3>Arbeitszeit</h3>
          <div class="option-list">
            <label class="check"><input type="checkbox" data-filter-key="workingTime" value="V" /> Vollzeit</label>
            <label class="check"><input type="checkbox" data-filter-key="workingTime" value="T" /> Teilzeit</label>
          </div>
        </article>

        <article class="panel">
          <h3>Aktualität</h3>
          <div class="option-list">
            <label class="radio"><input type="radio" name="actuality" data-filter-key="period" value="" checked /> Alle</label>
            <label class="radio"><input type="radio" name="actuality" data-filter-key="period" value="LAST_24_HOURS" /> in den letzten 24 Stunden</label>
            <label class="radio"><input type="radio" name="actuality" data-filter-key="period" value="LAST_2_DAYS" /> in den letzten zwei Tagen</label>
            <label class="radio"><input type="radio" name="actuality" data-filter-key="period" value="LAST_WEEK" /> in der letzten Woche</label>
            <label class="radio"><input type="radio" name="actuality" data-filter-key="period" value="LAST_MONTH" /> im letzten Monat</label>
          </div>
        </article>

        <article class="panel">
          <h3>Dienstverhältnis</h3>
          <div class="option-list">
            <label class="check"><input type="checkbox" data-filter-key="employmentRelationship" value="AA" /> Arbeiter:innen/Angestellte</label>
            <label class="check"><input type="checkbox" data-filter-key="employmentRelationship" value="LS" /> Lehrstelle</label>
            <label class="check"><input type="checkbox" data-filter-key="employmentRelationship" value="SS" /> Saisonstelle</label>
            <label class="check"><input type="checkbox" data-filter-key="employmentRelationship" value="FS" /> Ferialstelle</label>
            <label class="check"><input type="checkbox" data-filter-key="employmentRelationship" value="BB" /> Sonstiges Beschäftigungsverhältnis</label>
          </div>
        </article>

        <article class="panel">
          <h3>Ausbildung</h3>
          <div class="option-list">
            <label class="check"><input type="checkbox" data-filter-key="educationLevels" value="P*" /> Keine Ausbildung/Pflichtschule</label>
            <label class="check"><input type="checkbox" data-filter-key="educationLevels" value="M*" /> Berufsbildende mittlere Schule</label>
            <label class="check"><input type="checkbox" data-filter-key="educationLevels" value="L*" /> Lehre/Lehre mit Meisterprüfung</label>
            <label class="check"><input type="checkbox" data-filter-key="educationLevels" value="H*" /> Matura</label>
            <label class="check"><input type="checkbox" data-filter-key="educationLevels" value="U*" /> Fachhochschule/Universität/pädagogische Hochschule</label>
          </div>
        </article>
      </section>

      <section class="card actions-card">
        <button id="run" type="button">Jetzt suchen &amp; exportieren</button>
        <button id="clear" class="ghost" type="button">Zurücksetzen</button>
        <span id="status"></span>
      </section>

      <section class="card" id="resultCard" hidden>
        <div class="resultHead">
          <h2>Ergebnis</h2>
          <div class="downloads">
            <button class="ghost" id="openResults" type="button">Tabelle im Browser öffnen ↗</button>
            <button class="ghost" id="csvBtn" type="button" disabled>CSV</button>
            <button class="ghost" id="xlsxBtn" type="button" disabled>Excel</button>
          </div>
        </div>
        <p id="summary"></p>
        <pre id="searchUrl"></pre>
        <div id="errors"></div>
      </section>
    </main>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
